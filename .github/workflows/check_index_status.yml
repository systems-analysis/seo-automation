name: "\U0001F50D Check Index Status"

on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:
    inputs:
      source:
        description: 'Источник URL'
        required: true
        default: 'sitemap'
        type: choice
        options:
          - sitemap
          - urls-file
          - single-url
      url:
        description: 'URL (для режима single-url)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F40D Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Install dependencies"
        run: pip install -r requirements.txt

      - name: "\U0001F4E5 Prepare URL list from sitemap"
        if: ${{ github.event.inputs.source == 'sitemap' || github.event.inputs.source == '' }}
        run: |
          python scripts/extract_sitemap_urls.py --output _sitemap_urls.txt

      - name: "\U0001F50D Check index status"
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'sitemap' }}"

          if [ "$SOURCE" = "sitemap" ]; then
            python scripts/check_index_status.py --urls _sitemap_urls.txt
          elif [ "$SOURCE" = "urls-file" ]; then
            python scripts/check_index_status.py --urls urls.txt
          elif [ "$SOURCE" = "single-url" ]; then
            python scripts/check_index_status.py --url "${{ github.event.inputs.url }}"
          fi

      - name: "\U0001F4CA Generate summary report"
        if: always()
        run: python scripts/generate_index_report.py

      - name: "\U0001F4BE Save logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-status-${{ github.run_number }}
          path: |
            logs/
            data/index_report.md
          retention-days: 30

      - name: "\U0001F4E4 Commit results to repo"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ data/ || true
          git diff --staged --quiet || git commit -m "🔍 Index status check $(date -u +%Y-%m-%d)"
          git push || true
