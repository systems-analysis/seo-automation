name: "\U0001F50D Check Index Status"

on:
  schedule:
    - cron: '37 7 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Источник URL'
        required: true
        default: 'all-urls'
        type: choice
        options:
          - all-urls
          - single-url
      url:
        description: 'URL (для режима single-url)'
        required: false
        type: string

concurrency:
  group: check-index-status
  cancel-in-progress: false

env:
  URLS_SOURCE: "https://raw.githubusercontent.com/systems-analysis/sitemap-data/refs/heads/main/sitemap/sitemap.txt"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F40D Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Install dependencies"
        run: pip install -r requirements.txt

      - name: "\U0001F4E5 Download URL list"
        if: ${{ github.event.inputs.source != 'single-url' }}
        run: |
          curl -sL "$URLS_SOURCE" -o _urls.txt
          echo "📥 Загружено $(wc -l < _urls.txt) URL"

      - name: "\U0001F50D Check index status"
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all-urls' }}"
          if [ "$SOURCE" = "single-url" ]; then
            python scripts/check_index_status.py --url "${{ github.event.inputs.url }}"
          else
            python scripts/check_index_status.py --urls _urls.txt --batch-size 1800
          fi

      - name: "\U0001F4BE Save logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-status-${{ github.run_number }}
          path: data_index_status/
          retention-days: 30

      - name: "\U0001F4E4 Commit to repo"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_index_status/ || true
          git diff --staged --quiet || git commit -m "🔍 Index check $(date -u +%Y-%m-%d)"
          git push || true
