name: 🔍 Check Index Status

on:
  # Каждую среду в 07:00 UTC
  schedule:
    - cron: '0 7 * * 3'

  # Ручной запуск
  workflow_dispatch:
    inputs:
      source:
        description: 'Источник URL'
        required: true
        default: 'sitemap'
        type: choice
        options:
          - sitemap
          - urls-file
          - single-url
      url:
        description: 'URL (для режима single-url)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📥 Prepare URL list from sitemap
        if: ${{ github.event.inputs.source == 'sitemap' || github.event.inputs.source == '' }}
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import urllib.request
          response = urllib.request.urlopen('https://systems-analysis.ru/sitemap.xml')
          tree = ET.parse(response)
          root = tree.getroot()
          ns = {'sm': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          urls = [loc.text for loc in root.findall('.//sm:loc', ns)]
          with open('_sitemap_urls.txt', 'w') as f:
              for url in urls:
                  f.write(url + '\n')
          print(f'Extracted {len(urls)} URLs from sitemap')
          "

      - name: 🔍 Check index status
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'sitemap' }}"

          if [ "$SOURCE" = "sitemap" ]; then
            python scripts/check_index_status.py --urls _sitemap_urls.txt
          elif [ "$SOURCE" = "urls-file" ]; then
            python scripts/check_index_status.py --urls urls.txt
          elif [ "$SOURCE" = "single-url" ]; then
            python scripts/check_index_status.py --url "${{ github.event.inputs.url }}"
          fi

      - name: 📊 Generate summary report
        if: always()
        run: |
          python -c "
          import json, glob, os
          files = sorted(glob.glob('logs/index_status_*.json'))
          if not files:
              print('No status files found')
              exit(0)
          latest = files[-1]
          with open(latest) as f:
              data = json.load(f)

          indexed = [r for r in data if r.get('verdict') == 'PASS']
          not_indexed = [r for r in data if r.get('status') == 'success' and r.get('verdict') != 'PASS']
          errors = [r for r in data if r.get('status') == 'error']

          print(f'=== ОТЧЁТ ПО ИНДЕКСАЦИИ ===')
          print(f'Всего проверено: {len(data)}')
          print(f'✅ Проиндексировано: {len(indexed)}')
          print(f'⚠️  Не проиндексировано: {len(not_indexed)}')
          print(f'❌ Ошибки проверки: {len(errors)}')
          print()

          if not_indexed:
              print('--- Не проиндексированные страницы ---')
              for r in not_indexed:
                  print(f\"  {r['url']}\")
                  print(f\"    Причина: {r.get('coverageState', 'N/A')}\")
                  print(f\"    Статус: {r.get('indexingState', 'N/A')}\")
                  print()

          # Save summary as markdown
          with open('data/index_report.md', 'w') as f:
              f.write('# Отчёт по индексации\n\n')
              f.write(f'Дата проверки: {os.path.basename(latest).replace(\"index_status_\",\"\").replace(\".json\",\"\")}\n\n')
              f.write(f'| Метрика | Значение |\n|---------|----------|\n')
              f.write(f'| Всего проверено | {len(data)} |\n')
              f.write(f'| ✅ Проиндексировано | {len(indexed)} |\n')
              f.write(f'| ⚠️ Не проиндексировано | {len(not_indexed)} |\n')
              f.write(f'| ❌ Ошибки | {len(errors)} |\n\n')
              if not_indexed:
                  f.write('## Не проиндексированные страницы\n\n')
                  for r in not_indexed:
                      f.write(f\"- **{r['url']}**\n\")
                      f.write(f\"  - Причина: {r.get('coverageState', 'N/A')}\n\")
                      f.write(f\"  - Статус: {r.get('indexingState', 'N/A')}\n\n\")
          print('📄 Отчёт сохранён: data/index_report.md')
          "

      - name: 💾 Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-status-${{ github.run_number }}
          path: |
            logs/
            data/index_report.md
          retention-days: 30

      - name: 📤 Commit results to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ data/ || true
          git diff --staged --quiet || git commit -m "🔍 Index status check $(date -u +%Y-%m-%d)"
          git push || true
