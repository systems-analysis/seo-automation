name: "\U0001F504 Request Indexing"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим работы'
        required: true
        default: 'rotate'
        type: choice
        options:
          - rotate
          - single-url
      url:
        description: 'URL (для режима single-url)'
        required: false
        type: string

concurrency:
  group: request-indexing
  cancel-in-progress: false

env:
  URLS_SOURCE: "https://raw.githubusercontent.com/systems-analysis/sitemap-data/refs/heads/main/sitemap/sitemap.txt"

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F40D Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Install dependencies"
        run: pip install -r requirements.txt

      - name: "\U0001F4E5 Download URL list"
        if: ${{ github.event.inputs.mode != 'single-url' }}
        run: |
          curl -sfSL "$URLS_SOURCE" -o _urls.txt
          if [ ! -s _urls.txt ]; then
            echo "❌ Файл URL пуст или не загружен"
            exit 1
          fi
          echo "📥 Загружено $(wc -l < _urls.txt) URL"

      - name: "\U0001F680 Request indexing"
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          INPUT_MODE: ${{ github.event.inputs.mode || 'rotate' }}
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          if [ "$INPUT_MODE" = "single-url" ]; then
            if [ -z "$INPUT_URL" ]; then
              echo "❌ Режим single-url требует указания URL"
              exit 1
            fi
            python scripts/request_indexing.py --url "$INPUT_URL"
          else
            python scripts/request_indexing.py --urls _urls.txt --batch-size 200
          fi

      - name: "\U0001F4BE Save logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexing-logs-${{ github.run_number }}
          path: data_indexing/
          retention-days: 30

      - name: "\U0001F4E4 Commit to repo"
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_indexing/ || true
          git diff --staged --quiet && exit 0
          git commit -m "📝 Indexing $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
