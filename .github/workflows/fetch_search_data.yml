name: "\U0001F4CA Fetch Search Analytics"

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: 'Период (дней назад)'
        required: false
        default: '7'
        type: string
      query_filter:
        description: 'Фильтр по запросу (опционально)'
        required: false
        type: string

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F40D Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Install dependencies"
        run: pip install -r requirements.txt

      - name: "\U0001F4CA Fetch search data"
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          INPUT_DAYS: ${{ github.event.inputs.days || '7' }}
          INPUT_QUERY: ${{ github.event.inputs.query_filter }}
        run: |
          if [ -n "$INPUT_QUERY" ]; then
            python scripts/fetch_search_data.py --days "$INPUT_DAYS" --query "$INPUT_QUERY"
          else
            python scripts/fetch_search_data.py --days "$INPUT_DAYS"
          fi

      - name: "\U0001F4BE Save data"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-data-${{ github.run_number }}
          path: data_search/
          retention-days: 90

      - name: "\U0001F4E4 Commit to repo"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_search/ || true
          git diff --staged --quiet && exit 0
          git commit -m "📊 Search data $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
